[tool.black]
line-length = 88
target-version = ["py310"]
skip-string-normalization = false
skip-magic-trailing-comma = false

# Ignorar diretórios comuns em projetos de ML/LLM
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | env
  | __pycache__
  | build
  | dist
  | data
  | datasets
  | outputs
  | checkpoints
  | runs
  | wandb
  | mlruns
  | cache
  | \.mypy_cache
  | \.pytest_cache
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = ["venv", ".venv", "env"]

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503"]
exclude = [
  ".git",
  "__pycache__",
  "venv",
  ".venv",
  "build",
  "dist",
  "data",
  "datasets"
]
